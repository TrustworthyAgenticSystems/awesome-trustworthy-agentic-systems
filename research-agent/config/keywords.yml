# Keyword sets per harness layer.
#
# Used to query arXiv. All terms across all layers are OR'd together at the
# abstract level, then AND'd with the category filter (cs.AI, cs.CR, cs.LG,
# cs.SE, cs.DC, cs.OS).
#
# Keep terms specific. "agent" alone is too noisy; "agent harness" or
# "agentic system" is much tighter. The classifier will still filter out
# off-topic hits, but tighter queries mean fewer wasted Claude API calls.
#
# Tune as the field's terminology shifts.

layers:
  foundations:
    - "agentic system"
    - "agent harness"
    - "LLM agent system"
    - "trustworthy AI agent"

  execution-shell:
    - "agent sandbox"
    - "LLM sandbox"
    - "agent runtime"
    - "agent execution environment"

