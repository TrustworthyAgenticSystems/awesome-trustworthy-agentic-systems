name: Research sweep

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Sweep mode'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - bootstrap
      years:
        description: 'Backfill window in years (bootstrap mode only)'
        required: false
        default: '3'
  schedule:
    # Daily at 09:00 UTC
    - cron: '0 9 * * *'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: research-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: research-agent/requirements.txt

      - name: Install dependencies
        run: pip install -r research-agent/requirements.txt

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "mode=daily" >> "$GITHUB_OUTPUT"
            echo "years=3" >> "$GITHUB_OUTPUT"
          else
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "years=${{ inputs.years }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run sweep
        id: sweep
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
        working-directory: research-agent
        run: |
          set -euo pipefail
          if [ "${{ steps.mode.outputs.mode }}" = "bootstrap" ]; then
            python sweep.py bootstrap --years "${{ steps.mode.outputs.years }}" | tee /tmp/sweep_result.json
          else
            python sweep.py daily | tee /tmp/sweep_result.json
          fi
          entries=$(python -c "import json,sys; print(json.load(open('/tmp/sweep_result.json'))['entries'])")
          echo "entries=$entries" >> "$GITHUB_OUTPUT"

      - name: Open PR with drafts
        if: steps.sweep.outputs.entries != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: research-sweep/${{ steps.mode.outputs.mode }}-${{ github.run_number }}
          commit-message: "research-agent: drafted candidates from ${{ steps.mode.outputs.mode }} sweep"
          title: "research-agent: ${{ steps.sweep.outputs.entries }} candidate(s) from ${{ steps.mode.outputs.mode }} sweep"
          body: |
            Drafted by the research agent in **${{ steps.mode.outputs.mode }}** mode (run #${{ github.run_number }}).

            **${{ steps.sweep.outputs.entries }} candidate(s)** in `papers/drafts/`.

            Review each entry against the editorial bar in [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md):

            - [ ] Verify each URL resolves and points to the canonical paper
            - [ ] Verify authors, venue, and year are correct
            - [ ] Verify the assigned `layer` matches the paper's primary contribution
            - [ ] Verify the one-line `summary` describes the actual contribution (no marketing language)
            - [ ] Move kept entries into `papers/papers.yml`
            - [ ] Add corresponding BibTeX entries to `papers/papers.bib`
            - [ ] Delete the draft file once merging is complete

            ⚠️ Do not merge entries directly from the draft — `papers/papers.yml` is the canonical source.
          add-paths: |
            papers/drafts/**
