name: Deploy site

# Builds site/entries.json from data/ and publishes the static site to GitHub
# Pages. Requires Pages enabled (Settings -> Pages -> Source: GitHub Actions).
# Pages on private repos needs a plan that supports it; otherwise make the repo
# public first.

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'site/**'
      - 'taxonomy.yml'
      - 'scripts/build_site.py'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Build site data from data/
        run: python scripts/build_site.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
