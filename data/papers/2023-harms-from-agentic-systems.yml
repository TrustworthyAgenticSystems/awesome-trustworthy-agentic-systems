title: Harms from Increasingly Agentic Algorithmic Systems
url: https://arxiv.org/abs/2302.10329
authors:
  - Alan Chan
  - Rebecca Salganik
  - Alva Markelius
  - Chris Pang
  - Nitarshan Rajkumar
  - Dmitrii Krasheninnikov
venue: FAccT
year: 2023

summary: >
  Characterizes how harms change as algorithmic systems gain autonomy,
  underspecification, directness of impact, and goal-directedness. It connects
  prior fairness and safety scholarship to the agentic setting and argues that
  increasing agency reshapes accountability rather than only amplifying existing
  risks.

