summary: >
  A practical engineering guide that separates predictable workflows from
  open-ended agents and catalogs composable patterns such as prompt chaining,
  routing, orchestrator-workers, and evaluator-optimizer. It argues for the
  simplest structure that solves the task, which is a useful counterweight to
  unnecessary multi-agent complexity.

