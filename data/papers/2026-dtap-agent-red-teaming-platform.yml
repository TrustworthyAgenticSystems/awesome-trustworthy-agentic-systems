venue: arXiv
year: 2026

summary: >
  Extends the DecodingTrust trustworthiness benchmark to agents with a
  controllable, fully simulated red-teaming platform spanning many domains and
  dozens of reproducible environments. It supports prompt, tool, skill,
  environment, and compositional injections and ships an autonomous red-teaming
  agent with verifiable judges, giving evaluation of agent security a realistic
  and repeatable harness rather than static prompts.

