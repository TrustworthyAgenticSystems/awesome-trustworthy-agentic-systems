id: 2024-agentpoison-poisoning-agent-memory
type: papers
title: "AgentPoison: Red-teaming LLM Agents via Poisoning Memory or Knowledge Bases"
url: https://arxiv.org/abs/2407.12784
code: https://github.com/BillChan226/AgentPoison
authors:
  - Zhaorun Chen
  - Zhen Xiang
  - Chaowei Xiao
  - Dawn Song
  - Bo Li
venue: NeurIPS
year: 2024

summary: >
  Introduces a backdoor attack on generic and retrieval-augmented LLM agents
  that poisons the agent's long-term memory or knowledge base with a small number
  of malicious examples. An optimized trigger maps poisoned instances into a
  distinct embedding region so they are retrieved on demand, inducing unsafe
  actions while leaving benign behavior intact and requiring no model
  fine-tuning.

