summary: >
  Provides a dynamic benchmark of realistic tool-using agent tasks paired with
  security test cases, so attacks and defenses are measured on end-to-end agent
  behavior rather than isolated prompts. It moves prompt-injection evaluation
  from static strings to executable, workflow-level adversarial testing.

