summary: >
  Proposes baseline operational practices for keeping agentic systems
  accountable across their lifecycle, including suitability evaluation,
  constraining the action space, human approval for high-stakes actions,
  interruptibility, and attributability of actions to a responsible party.
  It is one of the clearest early statements of governance primitives for
  deployed agents.

