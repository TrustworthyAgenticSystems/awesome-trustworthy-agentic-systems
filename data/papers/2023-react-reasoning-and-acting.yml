venue: ICLR
year: 2023

summary: >
  Interleaves chain-of-thought reasoning with task actions so a language model
  alternates between thinking and calling external tools or environments. The
  pattern reduces hallucination and error propagation on question answering and
  interactive decision making, and it became a foundational control loop for
  later tool-using agents.

