  - Mintong Kang
  - Jiawei Zhang
  - Zeyi Liao
  - Lingbo Mo
  - Mengqi Yuan
  - Huan Sun
  - Bo Li
venue: ICML
year: 2025

summary: >
  Trains a reinforcement-learning adversarial prompter that generates stealthy,
  controllable web-page injections to hijack web agents toward attacker-chosen
  actions, operating in a black-box setting and adapting across attack goals from
  agent feedback. It reports high attack success against a strong vision-language
  web agent and remains effective against prompt-based defenses.

