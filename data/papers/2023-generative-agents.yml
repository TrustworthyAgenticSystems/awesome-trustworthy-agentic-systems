summary: >
  Gives language-model agents a memory stream, periodic reflection, and planning
  so they produce believable individual and emergent group behavior in a sandbox
  world. The memory-retrieval-reflection architecture is an early concrete design
  for long-lived agent memory and its integrity over many steps.

