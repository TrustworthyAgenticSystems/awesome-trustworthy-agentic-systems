summary: >
  Introduces a regulation-grounded, hazard-focused safety benchmark of thousands
  of prompts across six high-risk scientific domains including chemistry,
  biology, medicine, and physics. Evaluating many frontier models reveals high
  policy-violation rates, giving safety alignment a domain-specific, hazard-aware
  yardstick rather than a generic one.

