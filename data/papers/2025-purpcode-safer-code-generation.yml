venue: arXiv
year: 2025

summary: >
  Aligns coding models to generate secure code and refuse attack-assistance
  requests while preserving utility, using a two-stage method that first teaches
  concrete vulnerability rules and then generalizes the safety reasoning with
  reinforcement learning. An internal red-teaming pipeline supplies hard
  adversarial and multi-turn cases. It won the defender track of the Amazon Nova
  AI Challenge 2025.

