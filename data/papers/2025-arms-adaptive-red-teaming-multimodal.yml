venue: arXiv
year: 2025

summary: >
  Builds an adaptive red-teaming agent that orchestrates many multimodal attack
  strategies exposed as plug-and-play tools through the Model Context Protocol,
  using layered memory and multi-step reasoning to balance attack diversity and
  effectiveness. It releases ARMs-Bench, a large multimodal red-teaming dataset
  spanning dozens of risk categories.

