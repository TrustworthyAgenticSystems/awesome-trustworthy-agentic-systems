id: 2025-arms-adaptive-red-teaming-multimodal
type: papers
title: "ARMs: Adaptive Red-Teaming Agent against Multimodal Models with Plug-and-Play Attacks"
url: https://arxiv.org/abs/2510.02677
authors:
