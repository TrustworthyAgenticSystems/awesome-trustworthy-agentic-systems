org: MIT-IBM Watson AI Lab
venue: arXiv
year: 2025

summary: >
  Releases the largest open tool-agentic dataset, roughly 1.5 million trajectories
  synthesized from hundreds of real Model Context Protocol servers spanning
  thousands of tools, with real tool execution and verified calls. Models trained
  on it surpass much larger closed-source baselines on tool-use benchmarks, giving
  the open community realistic multi-tool, multi-step training data for the
  tool-interface layer.

