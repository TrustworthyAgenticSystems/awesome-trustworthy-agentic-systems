id: 2023-decodingtrust-trustworthiness-gpt
type: papers
title: "DecodingTrust: A Comprehensive Assessment of Trustworthiness in GPT Models"
url: https://arxiv.org/abs/2306.11698
code: https://github.com/AI-secure/DecodingTrust
authors:
