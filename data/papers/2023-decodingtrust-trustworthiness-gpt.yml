venue: NeurIPS
year: 2023

summary: >
  Provides a broad trustworthiness benchmark for large language models across
  eight perspectives, including toxicity, stereotype bias, adversarial and
  out-of-distribution robustness, robustness to adversarial demonstrations,
  privacy, machine ethics, and fairness. It is a widely cited reference for
  evaluating model-level trust properties that agentic systems build on, and it
  won an outstanding paper award.

