venue: arXiv
year: 2026
summary: GAIATrace is the first token-level trace dataset of two state-of-the-art agentic systems (MiroThinker
  and OWL) running GAIA, a benchmark composed of a heterogeneous mix of general-purpose tasks. Vidur-Agent
  is a trace-driven simulator that can replay GAIATrace to perform reproducible, low-cost system evaluation
  across diverse simulated environments.
