year: 2023

summary: >
  Introduces Greedy Coordinate Gradient, an automated method that finds
  adversarial suffixes which bypass alignment safeguards and transfer across
  both open and closed models. It showed that jailbreaks can be discovered
  programmatically rather than hand-crafted, which raises the bar for any
  prompt-level defense.

