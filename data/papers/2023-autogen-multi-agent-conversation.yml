venue: arXiv
year: 2023

summary: >
  Frames LLM applications as conversations among configurable, role-specialized
  agents that exchange natural-language messages to solve a task together. The
  framework standardizes how planner, executor, and reviewer roles compose, and
  it became a widely used reference implementation for multi-agent coordination.

