  reviewed_by: yuanxue
  rationale: >
    Supply-chain layer, security guarantee. The exposed surface was the harness
    (tool integrations, control logic, packaging defaults), not model weights,
    which is the resource's central thesis. Discovered by Chaofan Shou; no formal
    vendor advisory exists, so a reputable trade-press report is the primary
    source.

