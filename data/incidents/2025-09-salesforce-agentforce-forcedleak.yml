  rationale: >
    CRM agent ingests externally submitted records and acts on them, so untrusted
    data drives agent behavior: tool-interface plus permissions, privacy and
    security. The stale allowlisted domain is a permissions and trust-boundary
    failure. Primary source is the Noma Security disclosure, corroborated by The
    Hacker News.
