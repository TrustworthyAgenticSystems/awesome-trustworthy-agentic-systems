id: 2025-09-salesforce-agentforce-forcedleak
type: incidents
title: Salesforce Agentforce ForcedLeak indirect prompt injection exfiltrated CRM data
url: https://noma.security/blog/forcedleak-agent-risks-exposed-in-salesforce-agentforce/
org: Salesforce
date: "2025-09-25"

summary: >
  Noma Security disclosed ForcedLeak, a vulnerability chain in Salesforce
  Agentforce rated CVSS 9.4, in September 2025. With Web-to-Lead enabled, an
  attacker could submit a lead whose description field held hidden instructions;
  when an employee later asked the agent to act on that lead, the agent ran the
  injected instructions and exfiltrated CRM data through an attacker-controlled
  image URL. An expired allowlisted domain that the researchers re-registered for
  a few dollars supplied a trusted exfiltration channel. Salesforce fixed it with
  trusted-URL output restrictions. The failure spanned the tool-interface and
  permissions layers, where ingested records drove agent actions.

