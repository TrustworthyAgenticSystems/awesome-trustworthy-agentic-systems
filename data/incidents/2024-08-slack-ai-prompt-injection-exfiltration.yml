  rationale: >
    RAG assistant retrieves untrusted workspace content and acts on it, so the
    injection enters through retrieval: tool-interface plus memory and context
    integrity, privacy as primary guarantee. Cited via Simon Willison's technical
    analysis, which credits and links the originating PromptArmor disclosure; the
    PromptArmor Substack original blocks automated link checks. Slack is owned by
    Salesforce; org left as Slack to match the product.
