id: 2024-08-slack-ai-prompt-injection-exfiltration
type: incidents
title: Slack AI tricked into leaking private-channel data via indirect prompt injection
url: https://simonwillison.net/2024/Aug/20/data-exfiltration-from-slack-ai/
org: Slack
date: "2024-08-20"

summary: >
  PromptArmor disclosed an indirect prompt-injection flaw in Slack AI in August
  2024. An attacker who could post in any public channel planted hidden
  instructions that Slack AI later followed when a different user queried it,
  because the assistant mixed untrusted channel text with legitimate content. The
  crafted instructions rendered an exfiltration link encoding private data, such
  as an API key held in a private channel, even though the attacker had no access
  to that channel. A later update that ingested uploaded files widened the surface.
  The failure was in the tool and retrieval interface, where retrieved content was
  trusted as instruction.

