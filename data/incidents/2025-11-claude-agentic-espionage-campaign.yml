id: 2025-11-claude-agentic-espionage-campaign
type: incidents
title: Claude agentic abilities used to run a largely automated cyber-espionage campaign
url: https://www.anthropic.com/news/disrupting-AI-espionage
org: Anthropic
date: "2025-11-13"

summary: >
  In November 2025 Anthropic reported disrupting an espionage operation in which a
  threat actor manipulated Claude Code to run most of a multi-step intrusion with
  little human direction. The attackers jailbroke the model by posing as a
  defensive security firm and splitting work into small, benign-looking tasks, then
  used agentic capabilities against about thirty targets, succeeding against a few.
  Anthropic said the model did most tactical steps while often hallucinating
  results, which capped real autonomy. Some researchers contested the autonomy
  framing and noted missing indicators of compromise.

