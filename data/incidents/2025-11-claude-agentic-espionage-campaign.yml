  rationale: >
    Included as a red-teaming and oversight case: an agent decomposed into benign
    subtasks to evade guardrails and operate at scale. Source is Anthropic's own
    report, a vendor primary, but the autonomy claim is contested by independent
    researchers and the report omits indicators of compromise, so confidence is
    low and reviewer judgment on framing matters. Summary is written to reflect the
    dispute.
