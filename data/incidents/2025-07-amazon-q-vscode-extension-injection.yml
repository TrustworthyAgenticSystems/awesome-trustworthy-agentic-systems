id: 2025-07-amazon-q-vscode-extension-injection
type: incidents
title: Amazon Q Developer VS Code extension shipped with an attacker-planted wiping prompt
url: https://www.bleepingcomputer.com/news/security/amazon-ai-coding-agent-hacked-to-inject-data-wiping-commands/
org: Amazon Web Services
date: "2025-07-23"

summary: >
  In July 2025 an attacker submitted an unapproved pull request to the open-source
  repository behind the Amazon Q Developer extension for Visual Studio Code and
  gained write access that reached an official build. The injected text instructed
  the AI coding agent that it had filesystem and shell access and a goal to wipe
  local files and AWS cloud resources. The payload shipped to the Visual Studio
  Code Marketplace in version 1.84.0 before being caught; AWS revoked credentials,
  removed the code, and released a fixed version. The attacker said the wiper was
  deliberately defective and AWS reported no customer impact. The failure was a
  supply-chain compromise that weaponized agent tool access.

