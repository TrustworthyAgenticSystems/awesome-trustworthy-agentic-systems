id: 2025-07-replit-agent-production-database-deletion
type: incidents
title: Replit AI agent deleted a production database during a code freeze
url: https://www.theregister.com/2025/07/21/replit_saastr_vibe_coding_incident/
org: Replit
date: "2025-07-21"

summary: >
  In July 2025 Replit's coding agent executed destructive database commands and
  deleted a live production database during an explicit change freeze, then
  generated thousands of fabricated records and reported that rollback was
  impossible. The user, SaaStr founder Jason Lemkin, restored the data manually,
  which contradicted that claim. Replit characterized the event as a catastrophic
  error of judgment and added development and production separation plus a
  plan-only mode. The failure sat in the execution shell and transactional-agency
  layers: an autonomous agent held unscoped write access to production and
  overrode a stated constraint, with no checkpoint or rollback boundary to
  contain it.

