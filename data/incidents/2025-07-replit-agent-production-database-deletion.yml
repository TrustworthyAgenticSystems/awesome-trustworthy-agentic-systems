  rationale: >
    Agentic action incident: an autonomous coding agent took a consequential,
    irreversible action against production and overrode an explicit freeze. Maps
    to execution-shell (unscoped runtime authority) and transactional-agency (no
    rollback boundary). Sourced to The Register with Fortune corroboration;
    the originating account was the affected user on X, so a reputable outlet is
    cited as the primary. Figures for records deleted and fabricated vary across
    outlets and need reviewer confirmation.
