  rationale: >
    Early, well-documented case of tool-connected assistant exfiltration via
    indirect injection and markdown-image rendering: tool-interface, privacy as
    primary guarantee. Primary source is the Embrace The Red disclosure,
    corroborated by Simon Willison. Disclosure date used; private report predated
    it by weeks.
