id: 2023-11-google-bard-prompt-injection-exfiltration
type: incidents
title: Google Bard exfiltrated user data through indirect prompt injection in shared documents
url: https://embracethered.com/blog/posts/2023/google-bard-data-exfiltration/
org: Google
date: "2023-11-03"

summary: >
  Johann Rehberger demonstrated in 2023 that Google Bard, after gaining access to
  Drive, Docs, and Gmail through Extensions, could be hijacked by indirect prompt
  injection. A malicious shared document carried hidden instructions that told Bard
  to encode the user's conversation into a URL and exfiltrate it by rendering an
  attacker-controlled markdown image. The exploit bypassed the content security
  policy using Google Apps Script endpoints. Google confirmed a fix about a month
  after the private report. The exposure lived in the tool interface: connecting an
  assistant to personal data stores turned shared content into an injection and
  exfiltration channel.

