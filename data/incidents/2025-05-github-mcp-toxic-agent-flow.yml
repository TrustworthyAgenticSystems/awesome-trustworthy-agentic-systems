id: 2025-05-github-mcp-toxic-agent-flow
type: incidents
title: GitHub MCP server abused to leak private repositories through a malicious issue
url: https://invariantlabs.ai/blog/mcp-github-vulnerability
org: GitHub
date: "2025-05-26"

summary: >
  Invariant Labs showed in May 2025 that an AI coding agent connected to GitHub's
  official MCP server could be turned against its user. An attacker files a
  malicious issue in a public repository; when the user asks the agent to review
  open issues, the agent reads the planted instructions and reuses the same GitHub
  token to pull data from the user's private repositories, exposing it through a
  pull request opened in the public repo. Invariant framed this as an architectural
  toxic agent flow rather than a server bug, so it is model-agnostic. Suggested
  mitigations include per-session repository limits and least-privilege tokens. The
  exposure was in the permissions and tool-interface layers.

harness_layer:
  - permissions
  - tool-interface
sprs:
  - security
  - privacy
open_problems:
  - least-privilege-reasoning
risk_phase:
  - tool
  - agent
disciplines:
