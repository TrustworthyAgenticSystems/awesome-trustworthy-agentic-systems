  - data-exfiltration

provenance:
  added_by: agent
  drafted_by: claude
  reviewed_by: yuanxue
  confidence: 0.85
  rationale: >
    Cross-repository token reuse driven by an injected instruction is a
    least-privilege failure at the tool boundary: permissions plus tool-interface,
    security and privacy. Primary source is the Invariant Labs disclosure,
    corroborated by DevClass and the upstream GitHub issue. GitHub frames the fix
    as client and token design rather than a single patch; reviewer should note the
    disputed remediation status.
status: published
