id: 2025-06-m365-copilot-echoleak-exfiltration
type: incidents
title: Microsoft 365 Copilot EchoLeak zero-click data exfiltration (CVE-2025-32711)
url: https://nvd.nist.gov/vuln/detail/CVE-2025-32711
org: Microsoft
date: "2025-06-11"

summary: >
  Researchers at Aim Labs disclosed EchoLeak, a zero-click prompt-injection chain
  in Microsoft 365 Copilot tracked as CVE-2025-32711. A single crafted email with
  hidden instructions caused Copilot to leak data within its access scope,
  including chat history and content from OneDrive, SharePoint, and Teams, with no
  user action. The chain evaded Microsoft's prompt-injection classifier and abused
  reference-style markdown and auto-fetched images to reach an attacker. Microsoft
  rated it critical and patched it server-side. The exposure lived in the tool and
  retrieval interface, where untrusted email reached a connected assistant with
  broad enterprise data access.

