  rationale: >
    Indirect prompt injection against a deployed, connector-equipped assistant
    that retrieves untrusted content (email, files): tool-interface plus memory
    and context integrity. Privacy is the primary guarantee broken, with security
    secondary. Primary source is the NVD CVE record; SecurityWeek and the Aim Labs
    disclosure corroborate. Severity differs by scorer (Microsoft 9.3, NVD 7.5);
    reviewer should pick which to cite.
