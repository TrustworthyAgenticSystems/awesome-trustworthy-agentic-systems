title: "ARTIPHISHELL: Shellphish's autonomous Cyber Reasoning System"
url: https://shellphish.net/aixcc/
org: Shellphish
year: 2025

summary: >
  An end-to-end autonomous cyber reasoning system that combines fuzzing, program
  analysis, and dozens of collaborating LLM agents to discover vulnerabilities,
  analyze root causes, and generate validated patches without human intervention.
  Built for the DARPA AI Cyber Challenge, where it was a finalist recognized for
  patch reliability, it is a large real-world reference for multi-agent
  orchestration on a security workflow.

