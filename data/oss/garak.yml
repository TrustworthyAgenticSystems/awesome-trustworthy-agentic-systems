summary: >
  An open-source scanner that probes language models for failure modes such as
  prompt injection, jailbreaks, toxic generation, and data leakage, combining
  static, dynamic, and adaptive probes. It brings repeatable, tool-driven
  red-teaming to model and agent assessment.

