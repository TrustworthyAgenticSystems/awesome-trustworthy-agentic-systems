authors:
  - Hector Garcia-Molina
  - Kenneth Salem
venue: SIGMOD
year: 1987

summary: >
  Defines the saga, a long-lived transaction split into a sequence of
  sub-transactions, each paired with a compensating action that semantically
  undoes it, so the system either completes or compensates back to consistency.
  The pattern is the classical systems answer to partial failure across
  multi-step side effects, which is exactly the transactional-agency problem for
  agents.

