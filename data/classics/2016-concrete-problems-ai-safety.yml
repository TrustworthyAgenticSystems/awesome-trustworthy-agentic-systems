id: 2016-concrete-problems-ai-safety
type: classics
title: Concrete Problems in AI Safety
url: https://arxiv.org/abs/1606.06565
authors:
  - Dario Amodei
  - Chris Olah
  - Jacob Steinhardt
  - Paul Christiano
  - John Schulman
  - Dan Mané
venue: arXiv
year: 2016

summary: >
  Frames AI safety as a set of concrete engineering problems arising from
  accidents, defined as unintended and harmful behavior from poorly specified
  objectives or unsafe exploration. Introduces failure categories that map
  cleanly onto agentic systems, including avoiding negative side effects,
  safe exploration, and scalable oversight.

